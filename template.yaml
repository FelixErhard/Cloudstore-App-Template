name: <DEIN-TEMPLATE-NAME>
display_name: "<DEINE-TEMPLATE-ANZEIGE-NAME>" # Dieser wird im Appstore angezeigt
description: "<DEINE-TEMPLATE-BESCHREIBUNG>"
version: "1.1.0"
category: "education"
author: <DEIN-NAME>
icon: nodejs.png

terraform:
  working_dir: terraform/
  required_version: ">= 1.6.0"

# Optional UI grouping metadata
ui:
  groups:
    - id: general
      title: "Allgemein"
      order: 1
    - id: students
      title: "Studierende"
      order: 2
      description: "Einstellungen für Gruppenmitglieder"
    - id: resources
      title: "Ressourcen"
      order: 3

parameters:

  - name: project_name
    type: string
    description: "Projektname (wird Hostname und Name des Shared-Folders)"
    required: true
    x-group: general
    x-order: 1
    x-ui:
      control: text
      placeholder: "z.B. mein-projekt-01"
    validation:
      pattern: "^[a-zA-Z0-9-_]{3,20}$"


# Ein User-Variable die nur ein einzelnen Wert erwartet
# Nutzt user-picker als Komponente zur Auswahl des Nutzers
  - name: admin_email
    type: string # entspricht terraform-type string z.B. admin_email": "s232711@student.dhbw-mannheim.de",    
    description: "Dozent mit Sudo-Rechten"
    required: true
    x-ui:
      widget: user-picker
      multi: false # Multi "false" stellt sicher dass nur ein Nutzer gewählt werden kann
      extract: email # Wert des Nutzers der an die App übergeben werden soll
      group: Allgemein
      order: 1
      placeholder: "Dozent auswählen..."
  
  - name: students
    type: array # entspricht terraform-type list(string) z.B. students: ["s1","s2"]
    description: "Studenten"
    required: true
    x-ui:
      widget: user-picker
      multi: true # Multi "true" stellt sicher dass mehrere Nutzer gewählt werden können
      extract: email # Wert des Nutzers der an die App übergeben werden soll
      group: Allgemein
      order: 1
      placeholder: "Student(en) auswählen..."


# Ein Variable zur Erstellung von Gruppen von Nutzern
# Nutzt group-builder als Komponente zur Erstellung von Gruppen

  - name: student_groups
    type: groups # neuer type enstpricht terraform-type map(list(string))
    description: "Projektgruppen der Studierenden"
    required: true
    x-ui:
      widget: group-builder
      extract: email # Wert des Nutzers der an die App übergeben werden soll
      group: Gruppen
      order: 1


  - name: git_repo_url
    type: string
    description: "Git Repository URL (wird in den Shared Folder geklont)"
    required: false
    x-group: general
    x-order: 3
    x-ui:
      control: text
      placeholder: "https://github.com/org/repo.git"
    validation:
      pattern: "^https?://.*\\.git$|^$"

  - name: student_emails
    type: array
    description: "E-Mails der Gruppenmitglieder"
    required: true
    x-group: students
    x-order: 1
    x-ui:
      control: chips
      itemFormat: email
      placeholder: "student1@beispiel.de, student2@beispiel.de"
    validation:
      min_items: 1
      max_items: 10

  - name: flavor_name
    type: string
    description: "Ressourcen (Quota)"
    required: true
    default: "gp1.medium"
    enum: ["gp1.small", "gp1.medium", "gp1.large"]
    x-group: resources
    x-order: 1
    x-ui:
      control: select
      options:
        - label: "Small (1 CPU, 2GB RAM)"
          value: "gp1.small"
        - label: "Medium (2 CPU, 4GB RAM)"
          value: "gp1.medium"
        - label: "Large (4 CPU, 8GB RAM)"
          value: "gp1.large"

  - name: node_version
    type: string
    description: "Node.js Version"
    required: true
    default: "20"
    enum: ["20", "18"]
    x-group: resources
    x-order: 2
    x-ui:
      control: select
      options:
        - label: "Node.js 20 (LTS)"
          value: "20"
        - label: "Node.js 18 (LTS)"
          value: "18"

outputs:
  - name: app_url
    description: "Web-Server URL (Port 3000)"
    display: true
  - name: ssh_command
    description: "SSH Befehl (Allgemein)"
    display: true
  - name: admin_credentials
    description: "Admin Login (Dozent)"
    sensitive: true
    display: false
  - name: student_credentials
    description: "Studenten Logins"
    sensitive: true
    display: false

estimated_costs:
  hourly: "0.10 - 0.25 EUR"
  monthly: "70 - 180 EUR"

requirements:
  - "SSH Port 22 access"
  - "Node.js application ports 3000, 8080"
