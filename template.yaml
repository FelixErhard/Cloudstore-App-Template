name: <DEIN-TEMPLATE-NAME>
display_name: "<DEINE-TEMPLATE-ANZEIGE-NAME>" # Dieser wird im Appstore angezeigt
description: "<DEINE-TEMPLATE-BESCHREIBUNG>"
version: "1.1.0"
category: "education"
author: <DEIN-NAME>
icon: nodejs.png

terraform:
  working_dir: terraform/
  required_version: ">= 1.6.0"

# Optional UI grouping metadata mit Beispielwerten
ui-groups:
  - id: general
    title: "Allgemein und Nutzer"
    order: 1
  - id: resources
    title: "Ressourcen"
    order: 2
  - id: specific
    title: "Spezifische Settings"
    order: 3

tags:
  - nodejs
  - javascript
  - education
  - group-work

# Ermöglicht die Option des automatischen Versendens der Credentails (Usernamen, Passwörter, SSH-Keys, ...) per Email
email_credentials:
  enabled: true

# Ermöglicht das diese App automatisch auch für mehrere User oder Gruppen als seperate Instanzen deployt werden können.
deploy-strategy: 
  one-instance: true
  one-per-user: true
  one-per-group: true


parameters:

  # "General" umfasst Allgemeine Informationen die für alle potenziellen Instanzen dieses Deployments gültig sind wie "App_name" oder User-Management.
  # Es steht im starken Zusammenhang mit den ausgewählten "deploy_strategy" Werten. Variablen können Hizugefügt werden wie bspw. "groups" gemiensam mit "one-per-group: true".  

  general:
    # App_name ist ein Pflichtfeld und darf nur an den angebenen Stellen bearbeitet werden. 
    - name: app_name
      type: string
      required: true
      validation:
        pattern: "^[a-zA-Z0-9-_]{3,20}$" 
      description: "Projektname (wird Hostname und Name des Shared-Folders)" # Kann bearbeitet werden
      x-ui:
        group_id: general
        in_group_order: 1        
        placeholder: "z.B. mein-projekt-01" # kann bearbeietet werden
      


  # Ein User-Variable die nur ein einzelnen Wert erwartet
  # Nutzt user-picker als Komponente zur Auswahl des Nutzers
    - name: admin_username
      type: string # entspricht terraform-type string z.B. admin_email": "s232711@student.dhbw-mannheim.de",    
      required: true
      description: "Username des Dozenten (erhält Sudo-Rechte)"
      x-ui:
        group_id: general
        in_group_order: 2          
        icon: Users       
        placeholder: "Dozent auswählen..."
        widget:
          type: user-picker
          multi: false
          extract: name
    
    - name: students
      type: array # entspricht terraform-type list(string) z.B. students: ["s1","s2"]
      required: true
      description: "Studenten"
      x-ui:
        group_id: general
        in_group_order: 3   
        icon: Users  
        placeholder: "Student(en) auswählen..."
        widget: 
          type: user-picker
          multi: true # Multi "true" stellt sicher dass mehrere Nutzer gewählt werden können
          extract: email # Wert des Nutzers der an die App übergeben werden soll
        


  # Ein Variable zur Erstellung von Gruppen von Nutzern
  # Nutzt group-builder als Komponente zur Erstellung von Gruppen

    - name: student_groups
      type: groups # neuer type enstpricht terraform-type map(list(string))
      required: true
      description: "Projektgruppen der Studierenden"
      x-ui:
        group_id: general
        in_group_order: 4        
        icon: Users 
        widget: 
          type: group-builder
          extract: email # Wert des Nutzers der an die App übergeben werden soll
        

  specific:
     # --- Ressourcen ---
    - name: flavor_name
      type: selection
      required: true
      default: "gp1.medium"
      options:
        - label: "Small (1 CPU, 2 GB RAM)"
          value: "gp1.small"
        - label: "Medium (2 CPU, 4 GB RAM) — Empfohlen"
          value: "gp1.medium"
        - label: "Large (4 CPU, 8 GB RAM)"
          value: "gp1.large"
      description: "VM-Größe für die Shared Development Environment"
      x-ui:
        group_id: resources
        in_group_order: 1   
        icon: Cpu
        hint: "Für 3-5 Personen wird Medium empfohlen"

    - name: node_version
      type: selection
      default: "20"
      options:
          - label: "Node.js 20 (LTS)"
            value: "20"
          - label: "Node.js 18 (LTS)"
            value: "18"
      required: true
      description: "Node.js Version"
      x-ui:
        group_id: specific
        in_group_order: 1           
        
      
    - name: git_repo_url
      type: string
      required: false
      validation:
        pattern: "^https?://.*\\.git$|^$"
      description: "Git Repository URL (wird in den Shared Folder geklont)"
      x-ui:
        group_id: specific
        in_group_order: 2   
        placeholder: "https://github.com/org/repo.git"
     

outputs:
  # SYSTEM PFLICHTFELDER (Hidden)
  - name: instance_id
    description: "System ID der Instanz"
    display: false

  - name: app_name
    description: "Projektname"
    display: true

  # USER OUTPUTS
  - name: app_url
    description: "Web-Server URL (Port 3000)"
    display: true

  - name: ssh_command
    description: "SSH Befehl für Zugriff"
    display: true

  - name: shared_folder_path
    description: "Pfad zum Shared Workspace"
    display: true

  - name: admin_credentials
    description: "Admin-Zugangsdaten (Dozent)"
    sensitive: true
    display: false

  - name: student_credentials
    description: "Studierenden-Zugangsdaten"
    sensitive: true
    display: false

  - name: ssh_private_key
    description: "SSH Private Key"
    sensitive: true
    display: false
